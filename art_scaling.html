<html>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Garamond;
}

.header {
  text-align: center;
  padding: 10px;
}

.container {
  border: 2px solid black;
  background-color: #E6E2D8;
  display: flex;
  flex-wrap: wrap;
  padding: 0 10px;
}

/* Create four equal columns that sits next to each other */
.column {
  background-color: #E6E2D8;
  flex: 25%;
  max-width: 25%;
  padding: 0 10px;
}

.column img {
  margin-top: 10px;
  vertical-align: middle;
}

/* Responsive layout - makes a two column-layout instead of four columns */
@media screen and (max-width: 800px) {
  .column {
    flex: 50%;
    max-width: 50%;
  }
}

/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 600px) {
  .column {
    flex: 100%;
    max-width: 100%;
  }
}
</style>
<body>
  

<!-- Header -->
<div class="header">
  <a style="font-size:25px;color:rgb(0, 0, 0);" href="index.html">Home</a>
  <h1>Artwork</h1>
  <p>Stuff I've made.</p>
</div>

<!-- Photo Grid -->
<div class="container"> 
  <div class="column">
    <img src="Photos/Artwork/big_buildings.JPG" style="width:100%">
    <img src="Photos/Artwork/buildings1.jpg" style="width:100%">
    <img src="Photos/Artwork/buildings_digital.PNG" style="width:100%">
  </div>
  
  <div class="column">
    <img src="Photos/Artwork/linesNfaces.jpg" style="width:100%">
    <img src="Photos/Artwork/mavi.jpg" style="width:100%">
    <img src="Photos/Artwork/sketch.jpg" style="width:100%">
    <img src="Photos/Artwork/sketch2.jpg" style="width:100%">
  </div> 
   
  <div class="column">
    <img src="Photos/Artwork/face1.jpg" style="width:100%">
    <img src="Photos/Artwork/face2.jpg" style="width:100%">
    <img src="Photos/Artwork/water_coolor.jpg" style="width:100%">
  </div>
  
  <div class="column">
    <img src="Photos/Artwork/sketches.jpg" style="width:100%">
    <img src="Photos/Artwork/small_paintings.jpg" style="width:100%">

</div>

</body>
</html>
